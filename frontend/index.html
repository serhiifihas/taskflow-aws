<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker AWS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="app-card">
      <header class="app-header">
        <div>
          <p class="eyebrow">AWS Portfolio Project</p>
          <h1>Task Tracker AWS</h1>
          <p class="subtitle">
            Serverless task manager powered by AWS Lambda, API Gateway, DynamoDB, and S3.
          </p>
        </div>
      </header>

      <section class="task-panel">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task..."
            maxlength="120"
          />
          <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
          <button class="btn btn-secondary" id="loadTasksBtn">Refresh</button>
        </div>

        <div id="message" class="message"></div>
      </section>

      <section class="list-section">
        <div class="section-header">
          <h2>Tasks</h2>
          <span id="taskCount" class="task-count">0 items</span>
        </div>

        <div id="emptyState" class="empty-state">
          No tasks yet. Add your first task above.
        </div>

        <ul id="taskList" class="task-list"></ul>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
